name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: dvaishu
          password: DVaishnavi@2110

      - name: Build Docker Image
        run: |
          docker build -t dvaishu/java-rest-api .

      - name: Push Docker Image
        run: |
          docker push dvaishu/java-rest-api